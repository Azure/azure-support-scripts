---
###############################################################################
# RHUI Break → Check → Fix Playbook
#
# Play 1: On all hosts (become: true)
#   - For each of 9 RHUI scenarios: break → run rhui-check.py → fix
#   - Per-scenario rhui-check.py results captured separately
#
# Play 2: On localhost
#   - Aggregate results into /var/www/html/results.json + index.html
###############################################################################

- name: "RHUI break, check, and fix"
  hosts: all
  become: true
  gather_facts: true
  any_errors_fatal: false

  vars:
    backup_dir: /var/tmp/rhuibreak_backups
    rhui4_ips:
      - "52.136.197.163"
      - "20.225.226.182"
      - "52.142.4.99"
      - "20.248.180.252"
      - "20.24.186.80"
    rhui3_ips:
      - "13.91.47.76"
      - "40.85.190.91"
      - "52.187.75.218"

  tasks:

    # ================================================================
    #  Preparation
    # ================================================================

    - name: "Prep: Create backup directory"
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"

    - name: "Prep: Query IMDS for image URN"
      ansible.builtin.uri:
        url: http://169.254.169.254/metadata/instance/compute/storageProfile/imageReference?api-version=2021-02-01
        headers:
          Metadata: "true"
        return_content: true
      register: imds_image
      failed_when: false
      changed_when: false

    - name: "Prep: Build image URN"
      ansible.builtin.set_fact:
        vm_urn: "{{ imds_image.json.publisher | default('unknown') }}:{{ imds_image.json.offer | default('unknown') }}:{{ imds_image.json.sku | default('unknown') }}:{{ imds_image.json.version | default('unknown') }}"
      when: imds_image.status == 200

    - name: "Prep: Fallback URN when IMDS unavailable"
      ansible.builtin.set_fact:
        vm_urn: "unknown:unknown:unknown:unknown"
      when: imds_image.status != 200

    # ================================================================
    #  Copy rhui-check.py to targets (once, before all scenarios)
    # ================================================================

    - name: "Prep: Copy rhui-check.py to target"
      ansible.builtin.copy:
        src: rhui-check.py
        dest: /tmp/rhui-check.py
        mode: "0755"

    # ================================================================
    #  Scenario 1 — Block outbound traffic to RHUI IPs (iptables)
    # ================================================================

    - name: "Break 1: Block RHUI4 + RHUI3 IPs via iptables"
      ansible.builtin.shell: |
        for ip in {{ rhui4_ips | join(' ') }} {{ rhui3_ips | join(' ') }}; do
          iptables -A OUTPUT -d "$ip" -j DROP
          echo "[BREAK-1] Blocked outbound traffic to $ip"
        done
        if command -v iptables-save &>/dev/null; then
          iptables-save > {{ backup_dir }}/iptables.rules.blocked
        fi
        echo "[BREAK-1] Scenario 1 broken: RHUI IPs blocked via iptables"
      register: break_1
      changed_when: true
      failed_when: false

    - name: "Check 1: Run rhui-check.py — iptables blocking RHUI IPs"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_1
      changed_when: false
      failed_when: false

    - name: "Fix 1: Remove iptables blocks on RHUI IPs"
      ansible.builtin.shell: |
        for ip in {{ rhui4_ips | join(' ') }} {{ rhui3_ips | join(' ') }}; do
          iptables -D OUTPUT -d "$ip" -j DROP 2>/dev/null || true
          echo "[FIX-1] Removed block for $ip"
        done
        echo "[FIX-1] Scenario 1 fixed: RHUI IPs unblocked"
      register: fix_1
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 2 — Add incorrect routes (force tunnel)
    # ================================================================

    - name: "Break 2: Add incorrect routes to RHUI4 IPs"
      ansible.builtin.shell: |
        for ip in {{ rhui4_ips | join(' ') }}; do
          ip route add "$ip" via 127.0.0.1 2>/dev/null || true
          echo "[BREAK-2] Added incorrect route for $ip"
        done
        echo "[BREAK-2] Scenario 2 broken: Incorrect routes added"
      register: break_2
      changed_when: true
      failed_when: false

    - name: "Check 2: Run rhui-check.py — incorrect routes"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_2
      changed_when: false
      failed_when: false

    - name: "Fix 2: Remove incorrect routes to RHUI4 IPs"
      ansible.builtin.shell: |
        for ip in {{ rhui4_ips | join(' ') }}; do
          ip route del "$ip" via 127.0.0.1 2>/dev/null || true
          echo "[FIX-2] Removed incorrect route for $ip"
        done
        echo "[FIX-2] Scenario 2 fixed: Incorrect routes removed"
      register: fix_2
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 3 — Block RHUI via /etc/hosts
    # ================================================================

    - name: "Break 3: Redirect RHUI hostnames to localhost in /etc/hosts"
      ansible.builtin.shell: |
        cp -a /etc/hosts {{ backup_dir }}/hosts.backup.$(date +%s)
        cat >> /etc/hosts <<'HOSTSEOF'

        # RHUI Break - Scenario 3
        127.0.0.1 rhui-1.microsoft.com
        127.0.0.1 rhui-2.microsoft.com
        127.0.0.1 rhui-3.microsoft.com
        127.0.0.1 rhui4-1.microsoft.com
        127.0.0.1 rhui4-2.microsoft.com
        127.0.0.1 rhui4-3.microsoft.com
        HOSTSEOF
        echo "[BREAK-3] Scenario 3 broken: RHUI hostnames redirected to localhost"
      register: break_3
      changed_when: true
      failed_when: false

    - name: "Check 3: Run rhui-check.py — /etc/hosts hijack"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_3
      changed_when: false
      failed_when: false

    - name: "Fix 3: Remove RHUI hostname blocks from /etc/hosts"
      ansible.builtin.shell: |
        sed -i '/# RHUI Break - Scenario 3/,+6d' /etc/hosts
        echo "[FIX-3] Scenario 3 fixed: RHUI hostname blocks removed"
      register: fix_3
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 4 — Corrupt CA certificates
    # ================================================================

    - name: "Break 4: Corrupt CA certificate bundle"
      ansible.builtin.shell: |
        ca_file="/etc/pki/ca-trust/source/ca-bundle.trust.crt"
        if [[ ! -f "$ca_file" ]]; then
          ca_file="/usr/share/pki/ca-trust-source/ca-bundle.trust.p11-kit"
        fi
        if [[ -f "$ca_file" ]]; then
          cp -a "$ca_file" {{ backup_dir }}/$(basename "$ca_file").backup.$(date +%s)
          cp -a "$ca_file" "/tmp/$(basename "$ca_file").scenario4.orig"
          echo "INVALID CERTIFICATE DATA" >> "$ca_file"
          update-ca-trust 2>/dev/null || true
          echo "[BREAK-4] Scenario 4 broken: CA certificates corrupted ($ca_file)"
        else
          echo "[BREAK-4] ERROR: Could not find CA certificate source file"
          exit 1
        fi
      register: break_4
      changed_when: true
      failed_when: false

    - name: "Check 4: Run rhui-check.py — corrupt CA certificates"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_4
      changed_when: false
      failed_when: false

    - name: "Fix 4: Restore CA certificate bundle"
      ansible.builtin.shell: |
        ca_file="/etc/pki/ca-trust/source/ca-bundle.trust.crt"
        backup="/tmp/$(basename "$ca_file").scenario4.orig"
        if [[ ! -f "$ca_file" ]]; then
          ca_file="/usr/share/pki/ca-trust-source/ca-bundle.trust.p11-kit"
          backup="/tmp/$(basename "$ca_file").scenario4.orig"
        fi
        if [[ -f "$backup" ]]; then
          cp -a "$backup" "$ca_file"
          rm -f "$backup"
          echo "[FIX-4] Restored CA file from $backup"
        else
          echo "[FIX-4] Backup not found, reinstalling ca-certificates"
          yum reinstall -y ca-certificates 2>/dev/null || dnf reinstall -y ca-certificates 2>/dev/null
        fi
        update-ca-trust
        echo "[FIX-4] Scenario 4 fixed: CA certificates restored"
      register: fix_4
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 5 — Incorrect proxy configuration
    # ================================================================

    - name: "Break 5: Add invalid proxy to yum/dnf config"
      ansible.builtin.shell: |
        proxy_block=$(cat <<'PROXYEOF'

        # RHUI Break - Scenario 5
        proxy=http://invalid-proxy.local:3128
        proxy_username=invalid-user
        proxy_password=invalid-password
        PROXYEOF
        )
        if [[ -f /etc/dnf/dnf.conf ]]; then
          cp -a /etc/dnf/dnf.conf {{ backup_dir }}/dnf.conf.backup.$(date +%s)
          echo "$proxy_block" >> /etc/dnf/dnf.conf
          echo "[BREAK-5] Added invalid proxy to /etc/dnf/dnf.conf"
        fi
        if [[ -f /etc/yum.conf && ! /etc/yum.conf -ef /etc/dnf/dnf.conf ]]; then
          cp -a /etc/yum.conf {{ backup_dir }}/yum.conf.backup.$(date +%s)
          echo "$proxy_block" >> /etc/yum.conf
          echo "[BREAK-5] Added invalid proxy to /etc/yum.conf"
        fi
        echo "[BREAK-5] Scenario 5 broken: Invalid proxy configuration added"
      register: break_5
      changed_when: true
      failed_when: false

    - name: "Check 5: Run rhui-check.py — invalid proxy configuration"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_5
      changed_when: false
      failed_when: false

    - name: "Fix 5: Remove invalid proxy from yum/dnf config"
      ansible.builtin.shell: |
        if [[ -f /etc/dnf/dnf.conf ]]; then
          sed -i --follow-symlinks '/# RHUI Break - Scenario 5/,+3d' /etc/dnf/dnf.conf
          echo "[FIX-5] Removed proxy from /etc/dnf/dnf.conf"
        fi
        if [[ -f /etc/yum.conf ]]; then
          sed -i --follow-symlinks '/# RHUI Break - Scenario 5/,+3d' /etc/yum.conf
          echo "[FIX-5] Removed proxy from /etc/yum.conf"
        fi
        echo "[FIX-5] Scenario 5 fixed: Proxy configuration removed"
      register: fix_5
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 6 — Corrupt RHUI repo file
    # ================================================================

    - name: "Break 6: Corrupt RHUI package repo file"
      ansible.builtin.shell: |
        rhui_pkg=$(rpm -qa 'rhui-*' | head -1)
        if [[ -z "$rhui_pkg" ]]; then
          echo "[BREAK-6] ERROR: No RHUI package found"
          exit 1
        fi
        repo_file=$(rpm -ql "$rhui_pkg" | grep '\.repo$' | head -1)
        if [[ -n "$repo_file" ]]; then
          cp -a "$repo_file" {{ backup_dir }}/$(basename "$repo_file").backup.$(date +%s)
          cp -a "$repo_file" "/tmp/$(basename "$repo_file").scenario6.orig"
          echo "CORRUPTED DATA" > "$repo_file"
          echo "[BREAK-6] Scenario 6 broken: Corrupted $repo_file"
        else
          echo "[BREAK-6] ERROR: No repo file found in $rhui_pkg"
          exit 1
        fi
      register: break_6
      changed_when: true
      failed_when: false

    - name: "Check 6: Run rhui-check.py — corrupt RHUI repo file"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_6
      changed_when: false
      failed_when: false

    - name: "Fix 6: Restore RHUI package repo file"
      ansible.builtin.shell: |
        rhui_pkg=$(rpm -qa 'rhui-*' | head -1)
        if [[ -z "$rhui_pkg" ]]; then
          echo "[FIX-6] ERROR: No RHUI package found"; exit 1
        fi
        repo_file=$(rpm -ql "$rhui_pkg" | grep '\.repo$' | head -1)
        backup="/tmp/$(basename "$repo_file").scenario6.orig"
        if [[ -f "$backup" ]]; then
          cp -a "$backup" "$repo_file"
          rm -f "$backup"
          echo "[FIX-6] Restored repo file from $backup"
        else
          echo "[FIX-6] Backup not found, reinstalling $rhui_pkg"
          if command -v dnf &>/dev/null; then
            dnf reinstall -y "$rhui_pkg"
          else
            yum reinstall -y "$rhui_pkg"
          fi
        fi
        echo "[FIX-6] Scenario 6 fixed: RHUI package files restored"
      register: fix_6
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 7 — Simulate certificate expiration
    # ================================================================

    - name: "Break 7: Replace RHUI client certificate with expired cert"
      ansible.builtin.shell: |
        rhui_pkg=$(rpm -qa 'rhui-*' | head -1)
        if [[ -z "$rhui_pkg" ]]; then
          echo "[BREAK-7] ERROR: No RHUI package found"
          exit 1
        fi
        cert_file=$(rpm -ql "$rhui_pkg" | grep '\.crt$' | head -1)
        key_file=$(rpm -ql "$rhui_pkg" | grep '\.pem$' | head -1)
        if [[ -z "$cert_file" ]]; then
          echo "[BREAK-7] ERROR: No certificate file found"
          exit 1
        fi
        cp -a "$cert_file" {{ backup_dir }}/$(basename "$cert_file").backup.$(date +%s)
        cp -a "$cert_file" "/tmp/$(basename "$cert_file").scenario7.orig"
        if [[ -n "$key_file" && -f "$key_file" ]]; then
          cp -a "$key_file" "/tmp/$(basename "$key_file").scenario7.orig"
        fi
        openssl req -x509 -newkey rsa:2048 -keyout /tmp/expired.key -out "$cert_file" \
          -days -1 -nodes -subj "/CN=expired.microsoft.com" 2>/dev/null || {
          echo "EXPIRED CERTIFICATE" > "$cert_file"
        }
        echo "[BREAK-7] Scenario 7 broken: Certificate corrupted/expired ($cert_file)"
      register: break_7
      changed_when: true
      failed_when: false

    - name: "Check 7: Run rhui-check.py — expired client certificate"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_7
      changed_when: false
      failed_when: false

    - name: "Fix 7: Restore RHUI client certificate"
      ansible.builtin.shell: |
        rhui_pkg=$(rpm -qa 'rhui-*' | head -1)
        if [[ -z "$rhui_pkg" ]]; then
          echo "[FIX-7] ERROR: No RHUI package found"; exit 1
        fi
        cert_file=$(rpm -ql "$rhui_pkg" | grep '\.crt$' | head -1)
        key_file=$(rpm -ql "$rhui_pkg" | grep '\.pem$' | head -1)
        cert_backup="/tmp/$(basename "$cert_file").scenario7.orig"
        restored=0
        if [[ -f "$cert_backup" ]]; then
          cp -a "$cert_backup" "$cert_file"
          rm -f "$cert_backup"
          echo "[FIX-7] Restored certificate from $cert_backup"
          restored=1
        fi
        if [[ -n "$key_file" ]]; then
          key_backup="/tmp/$(basename "$key_file").scenario7.orig"
          if [[ -f "$key_backup" ]]; then
            cp -a "$key_backup" "$key_file"
            rm -f "$key_backup"
            echo "[FIX-7] Restored key from $key_backup"
            restored=1
          fi
        fi
        if [[ $restored -eq 0 ]]; then
          echo "[FIX-7] Backup not found, reinstalling $rhui_pkg"
          rpm -e --nodeps "$rhui_pkg" 2>/dev/null || true
          if command -v dnf &>/dev/null; then
            yum install -y "$rhui_pkg" 2>/dev/null || dnf install -y "$rhui_pkg"
          else
            yum install -y "$rhui_pkg"
          fi
        fi
        rm -f /tmp/expired.key
        echo "[FIX-7] Scenario 7 fixed: Certificate restored"
      register: fix_7
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 8 — Corrupt repository configuration
    # ================================================================

    - name: "Break 8: Corrupt RHUI repo baseurl and disable repos"
      ansible.builtin.shell: |
        rhui_pkg=$(rpm -qa 'rhui-*' | head -1)
        if [[ -z "$rhui_pkg" ]]; then
          echo "[BREAK-8] ERROR: No RHUI package found"
          exit 1
        fi
        repo_file=$(rpm -ql "$rhui_pkg" | grep '\.repo$' | head -1)
        if [[ -z "$repo_file" ]]; then
          echo "[BREAK-8] ERROR: No repo file found"
          exit 1
        fi
        cp -a "$repo_file" {{ backup_dir }}/$(basename "$repo_file").backup.$(date +%s)
        cp -a "$repo_file" "/tmp/$(basename "$repo_file").scenario8.orig"
        sed -i 's|baseurl=|baseurl=http://invalid.repo.microsoft.com/|' "$repo_file"
        sed -i 's|enabled=1|enabled=0|g' "$repo_file"
        echo "[BREAK-8] Scenario 8 broken: Repository configuration corrupted ($repo_file)"
      register: break_8
      changed_when: true
      failed_when: false

    - name: "Check 8: Run rhui-check.py — corrupt baseurl and disabled repos"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_8
      changed_when: false
      failed_when: false

    - name: "Fix 8: Restore RHUI repository configuration"
      ansible.builtin.shell: |
        rhui_pkg=$(rpm -qa 'rhui-*' | head -1)
        if [[ -z "$rhui_pkg" ]]; then
          echo "[FIX-8] ERROR: No RHUI package found"; exit 1
        fi
        repo_file=$(rpm -ql "$rhui_pkg" | grep '\.repo$' | head -1)
        backup="/tmp/$(basename "$repo_file").scenario8.orig"
        if [[ -f "$backup" ]]; then
          cp -a "$backup" "$repo_file"
          rm -f "$backup"
          echo "[FIX-8] Restored repo file from $backup"
        else
          echo "[FIX-8] Backup not found, reinstalling $rhui_pkg"
          if command -v dnf &>/dev/null; then
            dnf reinstall -y "$rhui_pkg"
          else
            yum reinstall -y "$rhui_pkg"
          fi
        fi
        echo "[FIX-8] Scenario 8 fixed: Repository configuration restored"
      register: fix_8
      changed_when: true
      failed_when: false

    # ================================================================
    #  Scenario 9 — DNS resolution issues
    # ================================================================

    - name: "Break 9: Replace resolv.conf with invalid DNS"
      ansible.builtin.shell: |
        cp -a /etc/resolv.conf {{ backup_dir }}/resolv.conf.backup.$(date +%s)
        cat > /etc/resolv.conf <<'DNSEOF'
        # RHUI Break - Scenario 9
        nameserver 127.0.0.1
        nameserver 192.0.2.1
        DNSEOF
        chattr +i /etc/resolv.conf 2>/dev/null || true
        echo "[BREAK-9] Scenario 9 broken: DNS resolution broken"
      register: break_9
      changed_when: true
      failed_when: false

    - name: "Check 9: Run rhui-check.py — broken DNS resolution"
      ansible.builtin.shell: |
        {{ ansible_python.executable }} /tmp/rhui-check.py 2>&1
      register: rhui_check_9
      changed_when: false
      failed_when: false

    - name: "Fix 9: Restore DNS resolution"
      ansible.builtin.shell: |
        chattr -i /etc/resolv.conf 2>/dev/null || true
        latest_backup=$(ls -t {{ backup_dir }}/resolv.conf.backup.* 2>/dev/null | head -1)
        if [[ -n "$latest_backup" ]]; then
          cp "$latest_backup" /etc/resolv.conf
          echo "[FIX-9] Restored from backup: $latest_backup"
        else
          cat > /etc/resolv.conf <<'DNSEOF'
        nameserver 168.63.129.16
        options timeout:2 attempts:5
        DNSEOF
          echo "[FIX-9] Restored default Azure DNS configuration"
        fi
        echo "[FIX-9] Scenario 9 fixed: DNS resolution restored"
      register: fix_9
      changed_when: true
      failed_when: false

    # ================================================================
    #  Cleanup
    # ================================================================

    - name: "Cleanup: Remove rhui-check.py from target"
      ansible.builtin.file:
        path: /tmp/rhui-check.py
        state: absent

    # ================================================================
    #  Build per-host result
    # ================================================================

    - name: "Result: Assemble per-host data"
      ansible.builtin.set_fact:
        rhui_result:
          hostname: "{{ inventory_hostname }}"
          fqdn: "{{ ansible_fqdn | default(inventory_hostname) }}"
          ip: "{{ ansible_default_ipv4.address | default('unknown') }}"
          urn: "{{ vm_urn }}"
          distro: "{{ ansible_distribution | default('unknown') }}"
          distro_version: "{{ ansible_distribution_version | default('unknown') }}"
          kernel: "{{ ansible_kernel | default('unknown') }}"
          scenarios:
            scenario_1:
              break: { rc: "{{ break_1.rc }}", stdout: "{{ break_1.stdout | default('') }}", stderr: "{{ break_1.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_1.rc }}", stdout: "{{ rhui_check_1.stdout | default('') }}", stderr: "{{ rhui_check_1.stderr | default('') }}" }
              fix: { rc: "{{ fix_1.rc }}", stdout: "{{ fix_1.stdout | default('') }}", stderr: "{{ fix_1.stderr | default('') }}" }
            scenario_2:
              break: { rc: "{{ break_2.rc }}", stdout: "{{ break_2.stdout | default('') }}", stderr: "{{ break_2.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_2.rc }}", stdout: "{{ rhui_check_2.stdout | default('') }}", stderr: "{{ rhui_check_2.stderr | default('') }}" }
              fix: { rc: "{{ fix_2.rc }}", stdout: "{{ fix_2.stdout | default('') }}", stderr: "{{ fix_2.stderr | default('') }}" }
            scenario_3:
              break: { rc: "{{ break_3.rc }}", stdout: "{{ break_3.stdout | default('') }}", stderr: "{{ break_3.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_3.rc }}", stdout: "{{ rhui_check_3.stdout | default('') }}", stderr: "{{ rhui_check_3.stderr | default('') }}" }
              fix: { rc: "{{ fix_3.rc }}", stdout: "{{ fix_3.stdout | default('') }}", stderr: "{{ fix_3.stderr | default('') }}" }
            scenario_4:
              break: { rc: "{{ break_4.rc }}", stdout: "{{ break_4.stdout | default('') }}", stderr: "{{ break_4.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_4.rc }}", stdout: "{{ rhui_check_4.stdout | default('') }}", stderr: "{{ rhui_check_4.stderr | default('') }}" }
              fix: { rc: "{{ fix_4.rc }}", stdout: "{{ fix_4.stdout | default('') }}", stderr: "{{ fix_4.stderr | default('') }}" }
            scenario_5:
              break: { rc: "{{ break_5.rc }}", stdout: "{{ break_5.stdout | default('') }}", stderr: "{{ break_5.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_5.rc }}", stdout: "{{ rhui_check_5.stdout | default('') }}", stderr: "{{ rhui_check_5.stderr | default('') }}" }
              fix: { rc: "{{ fix_5.rc }}", stdout: "{{ fix_5.stdout | default('') }}", stderr: "{{ fix_5.stderr | default('') }}" }
            scenario_6:
              break: { rc: "{{ break_6.rc }}", stdout: "{{ break_6.stdout | default('') }}", stderr: "{{ break_6.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_6.rc }}", stdout: "{{ rhui_check_6.stdout | default('') }}", stderr: "{{ rhui_check_6.stderr | default('') }}" }
              fix: { rc: "{{ fix_6.rc }}", stdout: "{{ fix_6.stdout | default('') }}", stderr: "{{ fix_6.stderr | default('') }}" }
            scenario_7:
              break: { rc: "{{ break_7.rc }}", stdout: "{{ break_7.stdout | default('') }}", stderr: "{{ break_7.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_7.rc }}", stdout: "{{ rhui_check_7.stdout | default('') }}", stderr: "{{ rhui_check_7.stderr | default('') }}" }
              fix: { rc: "{{ fix_7.rc }}", stdout: "{{ fix_7.stdout | default('') }}", stderr: "{{ fix_7.stderr | default('') }}" }
            scenario_8:
              break: { rc: "{{ break_8.rc }}", stdout: "{{ break_8.stdout | default('') }}", stderr: "{{ break_8.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_8.rc }}", stdout: "{{ rhui_check_8.stdout | default('') }}", stderr: "{{ rhui_check_8.stderr | default('') }}" }
              fix: { rc: "{{ fix_8.rc }}", stdout: "{{ fix_8.stdout | default('') }}", stderr: "{{ fix_8.stderr | default('') }}" }
            scenario_9:
              break: { rc: "{{ break_9.rc }}", stdout: "{{ break_9.stdout | default('') }}", stderr: "{{ break_9.stderr | default('') }}" }
              check: { rc: "{{ rhui_check_9.rc }}", stdout: "{{ rhui_check_9.stdout | default('') }}", stderr: "{{ rhui_check_9.stderr | default('') }}" }
              fix: { rc: "{{ fix_9.rc }}", stdout: "{{ fix_9.stdout | default('') }}", stderr: "{{ fix_9.stderr | default('') }}" }

###############################################################################
# Play 2: Aggregate results into JSON + HTML on localhost
###############################################################################

- name: "Generate RHUI check report"
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:

    - name: "Collect hosts with results"
      ansible.builtin.set_fact:
        _collected: "{{ _collected | default([]) + [item] }}"
      loop: "{{ groups['all'] }}"
      when: hostvars[item].rhui_result is defined
      no_log: true

    - name: "Build combined report"
      ansible.builtin.set_fact:
        combined_report:
          _meta:
            description: "RHUI Break/Check/Fix Report — {{ _collected | default([]) | length }} hosts"
            total_hosts: "{{ _collected | default([]) | length }}"
            generated_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
          hosts: "{{ dict(_collected | default([]) | zip(_collected | default([]) | map('extract', hostvars, 'rhui_result'))) }}"

    - name: "Write /var/www/html/results.json"
      ansible.builtin.copy:
        dest: /var/www/html/results.json
        content: "{{ combined_report | to_nice_json }}"
        mode: "0644"

    - name: "Generate HTML report"
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        mode: "0644"
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>RHUI Break/Check/Fix Report</title>
          <style>
          :root{--b:#edebe9;--t:#201f1e;--m:#605e5c;--p:#0078d4;--hb:#0078d4;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--sans:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
          *{box-sizing:border-box}
          body{margin:0;font:14px var(--sans);color:var(--t);background:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}
          .hd{background:var(--hb);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px}
          .hd h1{margin:0;font-size:16px;font-weight:800}
          .hd .sp{flex:1}
          .gb{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.45);border-radius:8px;padding:3px 6px;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none}
          .gb:hover{background:rgba(255,255,255,.22)}
          .gb svg{width:14px;height:14px;fill:currentColor}
          .app{display:flex;height:calc(100vh - 42px)}
          .sb{width:300px;min-width:240px;border-right:1px solid var(--b);overflow-y:auto;background:#fafafa;flex-shrink:0}
          .vi{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--b);font-size:12px;display:flex;flex-direction:column;gap:2px}
          .vi:hover{background:#e8f0f8}
          .vi.on{background:var(--p);color:#fff}
          .vi.on .vm{color:rgba(255,255,255,.75)}
          .vn{font-weight:700;font-size:12px}
          .vm{color:var(--m);font-size:11px}
          .vp{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
          .mn{flex:1;overflow-y:auto;padding:16px}
          .pn{display:none}
          .pn.on{display:block}
          .pt{font-size:16px;font-weight:800;margin:0 0 4px}
          .ps{font-size:13px;color:var(--m);margin:0 0 12px}
          pre.d{background:#f8f8f8;border:1px solid var(--b);border-radius:6px;padding:8px;font:11px/1.35 var(--mono);overflow-x:auto;max-height:none;white-space:pre-wrap;margin:0}
          .pl{display:inline-block;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}
          .pe{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
          .pw{background:#fff7e6;color:#856404;border:1px solid #f3d08b}
          .po{background:#ecfdf3;color:#155724;border:1px solid #b7e3c4}
          .pi{background:#e8f0f8;color:#004085;border:1px solid #c9d8e6}
          .sum{margin:12px 0;padding:12px;background:#faf9f8;border:1px solid var(--b);border-radius:10px;font-size:13px}
          .sum b{font-size:18px}
          .stabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
          .stab{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:28px;padding:0 8px;border:1px solid var(--b);border-radius:999px;font-size:12px;font-weight:900;cursor:pointer;background:#fff;color:var(--t);user-select:none;transition:background .1s,border-color .1s}
          .stab:hover{background:#eef2ff;border-color:var(--p)}
          .stab.on{background:var(--p);color:#fff;border-color:var(--p)}
          .stab.det{border-color:#b7e3c4;background:#ecfdf3;color:#155724}
          .stab.det.on{background:#155724;color:#fff;border-color:#155724}
          .stab.mis{border-color:#f5c6cb;background:#f8d7da;color:#721c24}
          .stab.mis.on{background:#721c24;color:#fff;border-color:#721c24}
          .spanel{display:none}
          .spanel.on{display:block}
          .stitle{font-size:14px;font-weight:800;margin:0 0 4px}
          .sstatus{margin:0 0 10px;font-size:12px}
          .phase{margin-top:10px}
          .phase-hd{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;font-size:12px;font-weight:700;color:var(--m);user-select:none;border-bottom:1px solid var(--b)}
          .phase-hd:hover{color:var(--t)}
          .phase-hd .arr{display:inline-block;width:12px;font-size:10px;transition:transform .15s}
          .phase-hd.open .arr{transform:rotate(90deg)}
          .phase-bd{display:none;padding:8px 0}
          .phase-bd.open{display:block}
          .rc-ok{color:#155724}.rc-fail{color:#721c24}
          .rc-lbl{font-weight:900;font-size:11px;margin-left:auto}
          </style>
          </head>
          <body>
          <div class="hd">
            <h1>RHUI Break / Check / Fix Report</h1>
            <span class="sp"></span>
            <a class="gb" href="results.json" download><svg viewBox="0 0 16 16"><path d="M8 12l-4-4h2.5V3h3v5H12L8 12zm-5 1h10v1H3v-1z"/></svg> JSON</a>
          </div>

          {% set all_rows = [] %}
          {% set total = combined_report.hosts | length %}

          {% set scenario_names = {
            'scenario_1': '1. Block RHUI IPs (iptables)',
            'scenario_2': '2. Incorrect routes (force tunnel)',
            'scenario_3': '3. /etc/hosts hijack',
            'scenario_4': '4. Corrupt CA certificates',
            'scenario_5': '5. Invalid proxy config',
            'scenario_6': '6. Corrupt RHUI repo file',
            'scenario_7': '7. Expired client certificate',
            'scenario_8': '8. Corrupt repo baseurl',
            'scenario_9': '9. Break DNS resolution'
          } %}

          <div class="app">
          <div class="sb" id="sb">
          <div class="sum">
            <b>{{ total }}</b> hosts tested &times; 9 scenarios
          </div>
          {% for sku, h in combined_report.hosts.items() | sort %}
            {% set ns = namespace(det=0) %}
            {% for skey in scenario_names %}
              {% if h.scenarios[skey].check.rc | string != '0' %}{% set ns.det = ns.det + 1 %}{% endif %}
            {% endfor %}
            {% set _ = all_rows.append({'sku': sku, 'h': h, 'idx': loop.index0, 'detected': ns.det}) %}
            <div class="vi{% if loop.first %} on{% endif %}" onclick="showVM({{ loop.index0 }})" id="n{{ loop.index0 }}">
              <span class="vn">{{ h.hostname | default(sku) }}</span>
              <span class="vm">{{ h.urn | default('') }}</span>
              <span class="vm">{{ h.distro | default('') }} {{ h.distro_version | default('') }} &mdash; {{ h.kernel | default('') }}</span>
              <span class="vp">
                {% if ns.det == 9 %}<span class="pl po">{{ ns.det }}/9 detected</span>{% elif ns.det > 0 %}<span class="pl pw">{{ ns.det }}/9 detected</span>{% else %}<span class="pl pe">0/9 detected</span>{% endif %}
              </span>
            </div>
          {% endfor %}
          </div>

          <div class="mn" id="mn">
          {% for r in all_rows %}
          {% set h = r.h %}
          <div class="pn{% if loop.first %} on{% endif %}" id="v{{ r.idx }}">
            <div class="pt">{{ h.hostname | default(r.sku) }}</div>
            <div class="ps">{{ h.urn | default('') }}</div>
            <div class="ps">{{ h.distro | default('') }} {{ h.distro_version | default('') }} &mdash; Kernel {{ h.kernel | default('') }} &mdash; {{ h.ip | default('') }}</div>
            <div class="ps">Detection: <b>{{ r.detected }}/9</b> scenarios detected by rhui-check.py</div>

            <div class="stabs" role="tablist">
            <span style="font-size:12px;font-weight:700;color:var(--m);align-self:center;margin-right:4px">Scenarios:</span>
            {% for skey, sname in scenario_names.items() %}
              {% set sc = h.scenarios[skey] | default({}) %}
              {% set det = sc.check.rc | default('0') | string != '0' %}
              <button class="stab {% if det %}det{% else %}mis{% endif %}{% if loop.first %} on{% endif %}" role="tab" aria-selected="{% if loop.first %}true{% else %}false{% endif %}" title="{{ sname }}" onclick="showScen({{ r.idx }},{{ loop.index0 }})">{{ loop.index }}</button>
            {% endfor %}
            </div>

            {% for skey, sname in scenario_names.items() %}
              {% set sc = h.scenarios[skey] | default({}) %}
              {% set det = sc.check.rc | default('0') | string != '0' %}
              <div class="spanel{% if loop.first %} on{% endif %}" id="sp{{ r.idx }}_{{ loop.index0 }}">
                <div class="stitle">{{ sname }}</div>
                <div class="sstatus">{% if det %}<span class="pl po">rc={{ sc.check.rc }} &mdash; detected</span>{% else %}<span class="pl pe">rc={{ sc.check.rc | default('0') }} &mdash; missed</span>{% endif %}</div>

                <pre class="d">{{ sc.check.stdout | default('') }}</pre>
                {% if sc.check.stderr | default('') | length > 0 %}<pre class="d" style="border-color:#f5c6cb;margin-top:6px">{{ sc.check.stderr }}</pre>{% endif %}

                <div class="phase">
                  <div class="phase-hd" onclick="togglePhase(this)"><span class="arr">&#9654;</span> Break output <span class="rc-lbl {% if sc.break.rc | default('1') | int == 0 %}rc-ok{% else %}rc-fail{% endif %}">rc={{ sc.break.rc | default('?') }}</span></div>
                  <div class="phase-bd"><pre class="d">{{ sc.break.stdout | default('') }}</pre></div>
                </div>

                <div class="phase">
                  <div class="phase-hd" onclick="togglePhase(this)"><span class="arr">&#9654;</span> Fix output <span class="rc-lbl {% if sc.fix.rc | default('1') | int == 0 %}rc-ok{% else %}rc-fail{% endif %}">rc={{ sc.fix.rc | default('?') }}</span></div>
                  <div class="phase-bd"><pre class="d">{{ sc.fix.stdout | default('') }}</pre></div>
                </div>
              </div>
            {% endfor %}
          </div>
          {% endfor %}
          </div>
          </div>

          <script>
          function showVM(i){document.querySelectorAll('.vi').forEach(function(e){e.classList.remove('on')});document.querySelectorAll('.pn').forEach(function(e){e.classList.remove('on')});document.getElementById('n'+i).classList.add('on');document.getElementById('v'+i).classList.add('on');document.getElementById('mn').scrollTop=0}
          function showScen(vm,s){var p=document.getElementById('v'+vm);p.querySelectorAll('.stab').forEach(function(e,j){if(j===s){e.classList.add('on');e.setAttribute('aria-selected','true')}else{e.classList.remove('on');e.setAttribute('aria-selected','false')}});p.querySelectorAll('.spanel').forEach(function(e,j){if(j===s){e.classList.add('on')}else{e.classList.remove('on')}})}
          function togglePhase(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}
          </script>
          </body>
          </html>

    - name: "Report summary"
      ansible.builtin.debug:
        msg: >-
          RHUI report: {{ _collected | default([]) | length }} hosts tested,
          9 scenarios each. Results at /var/www/html/index.html
